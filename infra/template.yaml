AWSTemplateFormatVersion: "2010-09-09"
Description: ExtractKit minimal infrastructure

Parameters:
  ProjectName:
    Type: String
    Default: extractkit
  CodeS3Bucket:
    Type: String
  CodeS3Key:
    Type: String

Resources:
  ExtractKitTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref ProjectName
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "${FrontendBucket.Arn}/*"

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDbAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:TransactWriteItems
                  - dynamodb:UpdateItem
                Resource: !GetAtt ExtractKitTable.Arn
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  ExtractKitFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs20.x
      Architectures:
        - x86_64
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref CodeS3Bucket
        S3Key: !Ref CodeS3Key
      Environment:
        Variables:
          EXTRACTKIT_TABLE_NAME: !Ref ExtractKitTable
      Timeout: 10
      MemorySize: 256
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  ExtractKitFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt ExtractKitFunction.Arn

  ExtractKitFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName: !Ref ExtractKitFunction
      FunctionUrlAuthType: NONE
      Principal: "*"

  ExtractKitFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ExtractKitFunction
      InvokedViaFunctionUrl: true
      Principal: "*"

Outputs:
  ExtractKitTableName:
    Value: !Ref ExtractKitTable
  FrontendBucketName:
    Value: !Ref FrontendBucket
  FrontendWebsiteUrl:
    Value: !GetAtt FrontendBucket.WebsiteURL
  BackendFunctionUrl:
    Value: !GetAtt ExtractKitFunctionUrl.FunctionUrl
